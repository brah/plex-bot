[tool.black]
line-length = 108
target-version = ['py312']
skip-string-normalization = false
skip-magic-trailing-comma = false
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 108
target-version = "py312"

[tool.ruff.lint]
# Conservative, high-signal ruleset:
#   F   -> pyflakes (unused imports, undefined names, f-string mistakes)
#   E9  -> syntax / IndentationError / IO errors
# Broaden this (e.g. add "B", "I", "UP") once the codebase is clean for them.
select = ["E9", "F"]

[tool.pytest.ini_options]
# Put the repo root on sys.path so tests can import top-level modules and cogs.
pythonpath = ["."]
testpaths = ["tests"]
