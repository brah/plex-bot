name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint & syntax smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff==0.15.17"

      - name: Ruff lint
        run: ruff check .

      - name: Compile all sources (syntax smoke test)
        run: >-
          python -m compileall -q
          plexbot.py media_cache.py tautulli_wrapper.py utilities.py migrate_config.py
          config errors cogs

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Installing the pinned requirements also verifies they resolve together
        # on the supported Python version.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest -q
